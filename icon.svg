<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e22ce" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a" />
  
  <!-- Neural connections/Bridge -->
  <g filter="url(#glow)">
    <!-- Bridge Arcs -->
    <path d="M 120 360 C 200 180, 320 180, 400 360" fill="none" stroke="url(#glowGrad)" stroke-width="8" stroke-dasharray="2,2" opacity="0.6" />
    <path d="M 120 360 C 200 240, 320 240, 400 360" fill="none" stroke="url(#glowGrad)" stroke-width="12" />
    
    <!-- Flowing fibers -->
    <path d="M 280 270 C 340 270, 380 320, 420 380" fill="none" stroke="url(#purpleGrad)" stroke-width="10" stroke-linecap="round" />
    <path d="M 280 270 C 340 310, 390 350, 420 420" fill="none" stroke="url(#purpleGrad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Left nodes cluster -->
    <line x1="120" y1="360" x2="170" y2="300" stroke="#00f2fe" stroke-width="4" />
    <line x1="120" y1="360" x2="180" y2="390" stroke="#00f2fe" stroke-width="4" />
    <line x1="170" y1="300" x2="180" y2="390" stroke="#00f2fe" stroke-width="4" />
    <line x1="170" y1="300" x2="230" y2="320" stroke="#00f2fe" stroke-width="4" />
    <line x1="180" y1="390" x2="230" y2="320" stroke="#00f2fe" stroke-width="4" />
    <line x1="230" y1="320" x2="280" y2="270" stroke="#00f2fe" stroke-width="4" />

    <!-- Nodes -->
    <circle cx="120" cy="360" r="14" fill="#00f2fe" />
    <circle cx="170" cy="300" r="16" fill="#00f2fe" />
    <circle cx="180" cy="390" r="14" fill="#00f2fe" />
    <circle cx="230" cy="320" r="18" fill="#4facfe" />
    <circle cx="280" cy="270" r="16" fill="#7e22ce" />
    
    <circle cx="350" cy="310" r="12" fill="#ec4899" />
    <circle cx="420" cy="380" r="14" fill="#ec4899" />
  </g>
</svg>
