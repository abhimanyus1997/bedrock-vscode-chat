name: Build and Test VS Code Extension

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Run E2E Integration Tests
        run: |
          node test-implementation.js
          node test-tool-preservation.js

      - name: Package Extension VSIX
        run: npx @vscode/vsce package

      - name: Upload Build VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-bridge-copilot-vsix
          path: "*.vsix"
          if-no-files-found: error
